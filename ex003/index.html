<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 03 JS</title>
    <Style>
        body{
            background-color: blueviolet;
            color: antiquewhite;
            font: normal 20px Arial;

</head>
<body>
    <h1>Olá, mundo</h1>
    <p>Já me livrei da maldição</p>

    <script>
        let n1 = prompt("Digite um número:");
        let n2 = prompt("Digite outro número:");
        let resultado = Number(n1) + Number(n2);
        alert("O resultado da soma é: " + resultado);
        //(number + number) para adição
        //(string + string) para concatenação
        //parseInt() para converter string em número inteiro
        //parseFloat() para converter string em número decimal
        //Number() para converter string em número (inteiro ou decimal)
        //Exemplo de template string: `O resultado da soma é: ${resultado}`
    </script>
</body>
